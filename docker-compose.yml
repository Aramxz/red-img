services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kromos
      POSTGRES_USER: kromos
      POSTGRES_PASSWORD: kromos
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kromos -d kromos"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: info
      COOKIE_SECURE: "false"
      JWT_SECRET: replace-this-before-deploying
      DATABASE_URL: postgres://kromos:kromos@db:5432/kromos
      CORS_ORIGIN: http://localhost:4000
      UPLOAD_DIR: uploads
      MAX_UPLOAD_MB: 8
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
  uploads:
